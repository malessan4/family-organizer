# ============================================================
#  DESARROLLO LOCAL (application.properties)
#  Este archivo se sube a Git. NO poner credenciales aquí.
# ============================================================
spring.application.name=family-organizer

# El perfil activo lo define la variable de entorno SPRING_PROFILES_ACTIVE
# Si no está definido, usa "dev" por defecto
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration - valores desde variables de entorno
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate
# IMPORTANTE: "update" solo para dev. En prod se usa "validate"
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging SQL: solo en dev
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

# Security (JWT Secret) - OBLIGATORIO via variable de entorno
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS - orígenes permitidos (separados por coma)
# En dev: localhost. En prod: tu dominio real (ej: https://family-organizer.vercel.app)
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}
